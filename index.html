<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repair Café of the Peninsula – Coming Soon</title>
  <meta name="description" content="A community repair event coming to the San Francisco Bay Peninsula. Join our mailing list to be the first to know when we launch." />
  <meta property="og:title" content="Repair Café of the Peninsula – Coming Soon" />
  <meta property="og:description" content="A community repair event coming to the San Francisco Bay Peninsula. Join our community mailing list to be the first to know when we launch." />
  <meta property="og:image" content="https://repaircafepeninsula.org/preview.png" />
  <meta property="og:url" content="https://repaircafepeninsula.org/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Repair Café of the Peninsula" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Repair Café of the Peninsula – Coming Soon" />
  <meta name="twitter:description" content="A community repair event coming to the San Francisco Bay Peninsula. Join our mailing list to be the first to know when we launch." />
  <meta name="twitter:image" content="https://repaircafepeninsula.org/preview.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #F5F0E8;
      --green-dark:   #2C4A1E;
      --green-mid:    #3D6B2A;
      --green-light:  #5A8A3E;
      --tan:          #C9A87C;
      --brown-mid:    #8B5E3C;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a3310 0%, var(--green-dark) 50%, var(--green-mid) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Background radial accents */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(90, 138, 62, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(90, 138, 62, 0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Floating shapes */
    .shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .shape {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(245, 240, 232, 0.07);
      animation: float 8s ease-in-out infinite;
    }
    .shape-1 { width: 600px; height: 600px; top: -150px; left: -200px; animation-delay: 0s; }
    .shape-2 { width: 350px; height: 350px; bottom: -80px; right: -100px; animation-delay: -3s; }
    .shape-3 { width: 220px; height: 220px; top: 25%; right: 12%; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-20px) rotate(5deg); }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1s ease 0.2s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-img {
      display: block;
      width: min(840px, 80vw);
      margin: 0 auto 40px;
      animation: fadeUp 1s ease 0s both;
    }

    .coming-soon {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--tan);
      margin-bottom: 48px;
      display: block;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--tan);
      margin: 0 auto 48px;
      opacity: 0.5;
      border-radius: 2px;
    }

    .learn-more {
      display: inline-block;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, 0.6);
      text-decoration: none;
      border-bottom: 1px solid rgba(245, 240, 232, 0.25);
      padding-bottom: 3px;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .learn-more:hover {
      color: var(--cream);
      border-color: var(--tan);
    }
    .learn-more .arrow {
      display: inline-block;
      margin-left: 6px;
      transition: transform 0.3s ease;
    }
    .learn-more:hover .arrow { transform: translateX(4px); }

    /* Signup block */
    .signup-block {
      margin-bottom: 40px;
    }
    .signup-label {
      font-size: 0.92rem;
      color: rgba(245, 240, 232, 0.65);
      margin-bottom: 18px;
      line-height: 1.6;
    }
    .signup-btn {
      display: inline-block;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #2C4A1E;
      background: #C9A87C;
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 50px;
      transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }
    .signup-btn:hover {
      background: #F5F0E8;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .signup-btn .arrow {
      display: inline-block;
      margin-left: 6px;
      transition: transform 0.3s ease;
    }
    .signup-btn:hover .arrow { transform: translateX(4px); }

    /* Mouse parallax */
    .shapes .shape { transition: transform 0.1s linear; }
  </style>
</head>
<body>

  <div class="shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="content">
    <img src="rcp.png" alt="Repair Café of the Peninsula" class="logo-img" />
    <span class="coming-soon">Coming Soon</span>
    <div class="divider"></div>
    <div class="signup-block">
      <p class="signup-label">Be the first to know when we launch and start planning our first event.</p>
      <a href="http://eepurl.com/ggrhJO5w3i" class="signup-btn">Join our Community Mailing List <span class="arrow">&rarr;</span></a>
    </div>
    <a href="https://www.repaircafe.org/en/" target="_blank" rel="noopener" class="learn-more">
      Learn more about Repair Cafés <span class="arrow">&rarr;</span>
    </a>
  </div>

  <script>
    // Subtle mouse parallax on shapes
    document.addEventListener('mousemove', (e) => {
      const shapes = document.querySelectorAll('.shape');
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      shapes.forEach((shape, i) => {
        const factor = (i + 1) * 7;
        shape.style.transform = `translate(${dx * factor}px, ${dy * factor}px)`;
      });
    });
  </script>

</body>
</html>
